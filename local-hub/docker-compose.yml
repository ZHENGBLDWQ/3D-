services:
  bambu-agent:
    build: ../agent
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ./data:/opt/layertrace/data
    environment:
      LAYERTRACE_STATE_FILE: /opt/layertrace/data/agent-state.json
      PRINTER_CONNECTOR: bambu_lan

  camera-gateway:
    image: alexxit/go2rtc:latest
    restart: unless-stopped
    ports:
      - "1984:1984"
      - "8555:8555/tcp"
      - "8555:8555/udp"
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml:ro
    command: ["go2rtc", "-config", "/config/go2rtc.yaml"]
